# Production Configuration
server.port=5000

# MongoDB Configuration (MongoDB Atlas)
spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://username:password@cluster.mongodb.net/electronics_ecommerce?retryWrites=true&w=majority}
spring.data.mongodb.database=electronics_ecommerce

# JWT Configuration
jwt.secret=${JWT_SECRET:your-production-jwt-secret-key-here-make-it-very-long-and-secure}
jwt.expiration=${JWT_EXPIRATION:86400}

# Logging
logging.level.com.electronics=INFO
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN

# CORS Configuration
cors.allowed.origins=${CORS_ORIGINS:https://your-domain.com,https://www.your-domain.com}

# Application name
spring.application.name=electronics-ecommerce-backend

# Health check endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
